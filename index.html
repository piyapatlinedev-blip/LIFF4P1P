<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Random Image Generator</title>
    <!-- Include LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            font-family: sans-serif;
        }
        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.85); /* White overlay to make foreground pop */
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .image-grid img {
            width: 120px; height: 120px;
            object-fit: cover; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #loading { 
            font-size: 1.2rem;
            font-weight: bold;
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #error-msg {
            color: red;
            background: white;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="loading">Loading your images... Please wait.</div>
    <div id="error-msg"></div>
    
    <div class="image-grid" id="grid" style="display: none;">
        <!-- Images will be injected here -->
    </div>

    <script>
        // Your actual GAS URL
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwwUIzo1HhFgLLZRcR7AhqIAmNNdbsD8XDYBquagf6QaeRI5xLiIj9YZ_ALGRBZGTlj3w/exec';

        async function initializeApp() {
            try {
                // Initialize LIFF - REPLACE THIS WITH YOUR LIFF ID
                await liff.init({ liffId: "2010069035-mnQW6x9O" });
                
                // Fetch data from Google Apps Script
                const response = await fetch(GAS_WEB_APP_URL);
                const data = await response.json();

                if(data.status === 'success') {
                    renderImages(data);
                } else {
                    showError("Error loading images: " + data.message);
                }
            } catch (err) {
                showError("Initialization failed. Please try again.");
                console.error(err);
            }
        }

        function renderImages(data) {
            // Set Background
            document.body.style.backgroundImage = `url('${data.background}')`;

            // Hide loading, show grid
            document.getElementById('loading').style.display = 'none';
            const grid = document.getElementById('grid');
            grid.style.display = 'grid';

            // Insert 4 foreground images
            data.foregrounds.forEach(imgUrl => {
                const imgElement = document.createElement('img');
                imgElement.src = imgUrl;
                grid.appendChild(imgElement);
            });
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error-msg');
            errorDiv.style.display = 'block';
            errorDiv.innerText = message;
        }

        // Start the app
        initializeApp();
    </script>
</body>
</html>
